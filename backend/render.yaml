databases:
  - name: color-trading-db
    databaseName: color_trading
    user: postgres
    plan: free

services:
  - type: web
    name: backend-go
    plan: free
    env: image
    image: dhruvil2303/backend-go:latest
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: color-trading-db
          property: connectionString
      - key: PORT
        value: "8080" 

  - type: web
    name: engine-server
    plan: free
    env: image
    image: dhruvil2303/engine-server:latest
    envVars:
      - key: REDIS_URL
        sync: false 
      - key: BACKEND_GO_GRPC_URL
        value: "backend-go:8082" 
      - key: PORT
        value: "8080"

  - type: web
    name: ws-server-go
    plan: free
    env: image
    image: dhruvil2303/ws-server-go:latest
    envVars:
      - key: REDIS_URL
        sync: false
      - key: BACKEND_GO_GRPC_URL
        value: "backend-go:8082"
      - key: ENGINE_SERVER_GRPC_URL
        value: "engine-server:8083"
      - key: PORT
        value: "8090" 
